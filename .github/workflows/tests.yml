name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  unit-tests:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Check macOS launcher syntax
        if: runner.os == 'macOS'
        run: sh -n seestar-metcalf-stack.sh setup-macos.sh set-astrometry-api-key.sh macos/build-droplet.sh
